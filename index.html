<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Holzpflege‑Guide</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: #F4EFE6;
      color: #333;
    }

    /* 1) LOGO-BEREICH */
    .header-logo {
      background: #E8DFD1;
      padding: 1.5rem 1rem;
      text-align: center;
      border-bottom: 1px solid #ccc;
    }

    .header-logo img {
      height: 70px;
      border-radius: 12px;
    }

    /* 2) TITEL-BEREICH */
    .header-title {
      background: #E8DFD1;
      padding: 1.5rem 1rem;
      text-align: center;
      border-bottom: 1px solid #ccc;
    }

    .header-title h1 {
      font-family: "Playfair Display", serif;
      font-size: 2.2rem;
      margin: 0;
      color: #2F4F4F;
    }

    .header-title p {
      margin: 0.3rem 0 0;
      color: #555;
    }

    /* 3) NAVIGATION – bleibt sticky */
    .header-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #E8DFD1;
      padding: 0.6rem 0 0.8rem;
      border-bottom: 1px solid rgba(0,0,0,0.15);
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    nav a {
      text-decoration: none;
      padding: 0.45rem 0.9rem;
      background: white;
      border-radius: 999px;
      font-weight: 600;
      color: #2F4F4F;
      box-shadow: 3px 3px 8px rgba(0,0,0,0.08),
                  -3px -3px 8px rgba(255,255,255,0.9);
    }

    /* SECTION-GRUNDRAMEN */
    section {
      max-width: 1000px;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 20px;
      box-shadow: 12px 12px 28px rgba(0,0,0,0.08),
                  -10px -10px 26px rgba(255,255,255,0.7);
    }
  </style>
</head>

<body>

<!-- 1) LOGO -->
<div class="header-logo">
  <img src="holzpflege-guide-logo-dark.png" alt="Logo">
</div>

<!-- 2) TITEL -->
<div class="header-title">
  <h1>Holzpflege‑Guide</h1>
  <p>Untertitel / Claim</p>
</div>

<!-- 3) NAVIGATION (sticky) -->
<div class="header-nav">
  <nav>
    <ul>
      <li><a href="#start">Start</a></li>
      <li><a href="#holz-oelen">Holz ölen</a></li>
      <li><a href="#produkte">Produkte</a></li>
      <li><a href="#fehler">Fehler</a></li>
      <li><a href="#flecken">Flecken</a></li>
      <li><a href="#outdoor">Outdoor</a></li>
      <li><a href="#faq">FAQ</a></li>
    </ul>
  </nav>
</div>

<!-- HAUPTBEREICH -->
<main>

  <section id="start"><h2>Start</h2></section>
  <section id="holz-oelen"><h2>Holz ölen</h2></section>
  <section id="produkte"><h2>Produkte</h2></section>
  <section id="fehler"><h2>Fehler vermeiden</h2></section>
  <section id="flecken"><h2>Flecken entfernen</h2></section>
  <section id="outdoor"><h2>Outdoor</h2></section>
  <section id="faq"><h2>FAQ</h2></section>

</main>

</body>
</html>
