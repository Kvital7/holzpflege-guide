<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap');

  body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    background: #F2E9D8;
    color: #2F2F2F;
    line-height: 1.7;
  }

  header {
    background: #2F4F4F;
    color: #fff;
    padding: 3rem 1.5rem;
    text-align: center;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    margin: 0;
  }

  header p {
    font-size: 1.2rem;
    opacity: 0.9;
  }

  nav {
    background: #ffffff;
    border-bottom: 1px solid #ddd;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  nav ul {
    list-style: none;
    margin: 0;
    padding: 0.8rem 1rem;
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
  }

  nav a {
    text-decoration: none;
    color: #2F4F4F;
    font-weight: 600;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    transition: 0.2s;
  }

  nav a:hover {
    background: #006666;
    color: #fff;
  }

  main {
    max-width: 900px;
    margin: 2rem auto;
    padding: 2rem;
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-top: 0;
    color: #2F4F4F;
  }

  h3 {
    margin-top: 1.5rem;
    color: #006666;
  }

  a {
    color: #006666;
    font-weight: 600;
  }

  a:hover {
    text-decoration: underline;
  }

  footer {
    text-align: center;
    padding: 2rem;
    font-size: 0.9rem;
    color: #555;
  }
</style>
